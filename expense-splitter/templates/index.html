<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Splitter</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-icon"><i class="ti ti-receipt"></i></div>
    <h1>Expense Splitter</h1>
    <p>Split bills and notify everyone on WhatsApp</p>
  </div>

  <div class="grid">

    <!-- LEFT COLUMN -->
    <div class="left">

      <!-- ADD MEMBERS -->
      <div class="card">
        <h2><i class="ti ti-users"></i> Add Members</h2>
        <div class="form-group">
          <input type="text" id="memberName" placeholder="Name (e.g. Viraj)"/>
        </div>
        <div class="form-group">
          <input type="text" id="memberPhone" placeholder="Phone with country code (+91...)"/>
        </div>
        <button class="btn btn-primary" onclick="addMember()">
          <i class="ti ti-plus"></i> Add Member
        </button>
        <div class="member-list" id="memberList"></div>
      </div>

      <!-- ADD EXPENSES -->
      <div class="card">
        <h2><i class="ti ti-cash"></i> Add Expense</h2>
        <div class="form-group">
          <select id="paidBy">
            <option value="">Who paid?</option>
          </select>
        </div>
        <div class="form-group">
          <input type="number" id="amount" placeholder="Amount (₹)"/>
        </div>
        <div class="form-group">
          <input type="text" id="description" placeholder="What for? (e.g. Dinner)"/>
        </div>
        <button class="btn btn-primary" onclick="addExpense()">
          <i class="ti ti-plus"></i> Add Expense
        </button>
        <div class="expense-list" id="expenseList"></div>
      </div>

    </div>

    <!-- RIGHT COLUMN -->
    <div class="right">

      <!-- RESULTS -->
      <div class="card">
        <h2><i class="ti ti-calculator"></i> Settlement Summary</h2>
        <div id="resultArea">
          <p class="empty-msg">Add members and expenses to see the summary</p>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="calculate()">
            <i class="ti ti-calculator"></i> Calculate
          </button>
          <button class="btn btn-whatsapp" onclick="sendWhatsApp()">
            <i class="ti ti-brand-whatsapp"></i> Send WhatsApp
          </button>
          <button class="btn btn-danger" onclick="resetAll()">
            <i class="ti ti-trash"></i> Reset
          </button>
        </div>
      </div>

      <!-- STATUS LOG -->
      <div class="card">
        <h2><i class="ti ti-terminal"></i> Status Log</h2>
        <div id="statusLog" class="status-log">
          <p class="log-msg">Ready...</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
